<script>
async function main() {
  try {
    await liff.init({ liffId: "2009859817-80MaD7Mi" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    document.getElementById("points").innerText =
      "USER ID: " + profile.userId;

  } catch (err) {
    document.getElementById("points").innerText =
      "ERROR: " + err.message;
  }
}

main();
</script>
