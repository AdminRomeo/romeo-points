<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2 id="name">กำลังโหลด...</h2>
<h3 id="points">แต้ม: 0</h3>

<button onclick="addPoint()">สะสมแต้ม</button>

<script>
let userId = "";
let displayName = "";

// 👉 ใส่ค่าที่แก้แล้วตรงนี้
const LIFF_ID = "2009859930-oDRZGvUc";
const API_URL = "https://script.google.com/macros/s/AKfycbyRUjTvf3rczc1J8ZC1DMkAVdE6RMC-8qfNJkvI1gEB91gRCQVq4KlDd3VSNc1agELk/exec";

async function main() {
  await liff.init({ liffId: LIFF_ID });

  const profile = await liff.getProfile();
  userId = profile.userId;
  displayName = profile.displayName;

  document.getElementById("name").innerText = displayName;

  loadPoints();
}

async function loadPoints() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "get",
      userId: userId
    })
  });

  const data = await res.json();
  document.getElementById("points").innerText = "แต้ม: " + (data.points || 0);
}

async function addPoint() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      userId: userId,
      name: displayName
    })
  });

  const data = await res.json();
  document.getElementById("points").innerText = "แต้ม: " + (data.points || 0);
}

main();
</script>

</body>
</html>
