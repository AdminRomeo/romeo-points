<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2 id="name">กำลังโหลด...</h2>

<div id="registerBox" style="display:none;">
  <h3>สมัครสมาชิก</h3>
  <input id="phone" placeholder="เบอร์โทร"><br><br>
  <input id="birth" placeholder="วันเกิด"><br><br>
  <button onclick="register()">สมัครสมาชิก</button>
</div>

<div id="mainBox" style="display:none;">
  <h3 id="points">แต้ม: 0</h3>
  <button onclick="addPoint()">สะสมแต้ม</button>
</div>

<script>
const LIFF_ID = "2009859930-oDRZGvUc";
const API_URL = "https://script.google.com/macros/s/AKfycbyRUjTvf3rczc1J8ZC1DMkAVdE6RMC-8qfNJkvI1gEB91gRCQVq4KlDd3VSNc1agELk/exec";

let userId = "";
let displayName = "";

async function main() {
  await liff.init({ liffId: LIFF_ID });

  const profile = await liff.getProfile();
  userId = profile.userId;
  displayName = profile.displayName;

  document.getElementById("name").innerText = displayName;

  checkUser();
}

async function checkUser() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "get",
      userId: userId
    })
  });

  const data = await res.json();

  if (data.found) {
    document.getElementById("mainBox").style.display = "block";
    document.getElementById("points").innerText = "แต้ม: " + data.points;
  } else {
    document.getElementById("registerBox").style.display = "block";
  }
}

async function register() {
  const phone = document.getElementById("phone").value;
  const birth = document.getElementById("birth").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "register",
      userId: userId,
      name: displayName,
      phone: phone,
      birth: birth
    })
  });

  alert("สมัครสำเร็จ!");
  location.reload();
}

async function addPoint() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      userId: userId
    })
  });

  const data = await res.json();
  document.getElementById("points").innerText = "แต้ม: " + data.points;
}

main();
</script>

</body>
</html>
