<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Romeo Points</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body style="text-align:center;font-family:sans-serif;">

<h2>Romeo Voyage</h2>

<p id="name">กำลังโหลดชื่อ...</p>
<p id="userId"></p>
<h1 id="points">0 คะแนน</h1>

<button onclick="addPoint()" style="padding:10px 20px;font-size:18px;">
สะสมแต้ม
</button>

<script>
let userId = "";
let displayName = "";

async function main() {
  await liff.init({ liffId: "2009859930-oDRZGvUc" });

  if (!liff.isLoggedIn()) {
    liff.login();
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
  displayName = profile.displayName;

  document.getElementById("name").innerText = "ชื่อ: " + displayName;
  document.getElementById("userId").innerText = "ID: " + userId;

  loadPoints();
}

async function loadPoints() {
  const res = await fetch("👉 ใส่ URL Apps Script", {
    method: "POST",
    body: JSON.stringify({
      action: "get",
      userId: userId
    })
  });

  const data = await res.json();
  document.getElementById("points").innerText = data.points + " คะแนน";
}

async function addPoint() {
  const res = await fetch("👉 ใส่ URL Apps Script", {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      userId: userId,
      name: displayName
    })
  });

  const data = await res.json();
  document.getElementById("points").innerText = data.points + " คะแนน";
}

main();
</script>

</body>
</html>
